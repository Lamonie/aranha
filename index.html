<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIÊ FLASH</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* A TARJA PARA TAMPAR O LOGO ORIGINAL */
        #header-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 56px; /* Altura padrão do topo do YouTube */
            background-color: #0f0f0f; /* Cor exata do modo escuro do YouTube */
            display: flex;
            align-items: center;
            padding-left: 16px;
            z-index: 9999; /* Garante que fica por cima de tudo */
            border-bottom: 1px solid #333;
        }

        .logo-text {
            color: #FFD700; /* Dourado Lamoniê */
            font-family: 'Roboto', sans-serif;
            font-weight: bold;
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* O YOUTUBE REAL RODANDO POR BAIXO */
        #youtube-frame {
            width: 100%;
            height: calc(100% - 0px); /* Ocupa a tela toda */
            border: none;
            margin-top: 0px;
        }
    </style>
</head>
<body>

    <div id="header-overlay">
        <div class="logo-text">LAMONIÊ FLASH</div>
    </div>

    <iframe 
        id="youtube-frame" 
        src="https://www.youtube.com" 
        allow="autoplay; encrypted-media; picture-in-picture" 
        allowfullscreen>
    </iframe>

</body>
</html>
