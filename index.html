<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TESTE LAMONIÊ FLASH</title>
    <style>
        :root {
            --yt-black: #0f0f0f;
            --yt-white: #ffffff;
            --yt-gray: #272727;
            --lamonie-gold: #FFD700;
        }

        body {
            background-color: var(--yt-black);
            color: var(--yt-white);
            font-family: Arial, sans-serif;
            margin: 0;
            padding-bottom: 70px;
        }

        header {
            display: flex;
            align-items: center;
            padding: 10px 16px;
            height: 40px;
            position: fixed;
            top: 0;
            width: 100%;
            background: var(--yt-black);
            z-index: 1000;
            border-bottom: 1px solid #333;
        }

        .logo {
            font-weight: bold;
            font-size: 18px;
            color: var(--lamonie-gold);
        }

        /* ÁREA DO VÍDEO FIXA NO TOPO */
        #video-container {
            width: 100%;
            position: fixed;
            top: 60px;
            z-index: 900;
            background: #000;
        }

        .video-wrapper {
            width: 100%;
            aspect-ratio: 16 / 9;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* BOTÕES DE CATEGORIA */
        .categories {
            display: flex;
            overflow-x: auto;
            padding: 12px;
            gap: 10px;
            margin-top: calc(60px + 56.25vw);
        }

        .cat-btn {
            background: var(--yt-gray);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            border: none;
            font-size: 14px;
            white-space: nowrap;
        }

        /* LISTA DE VÍDEOS PARA CLICAR */
        .feed { padding: 15px; }
        
        .video-item {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            cursor: pointer;
            background: #1a1a1a;
            padding: 10px;
            border-radius: 8px;
        }

        .thumb-box {
            width: 140px;
            height: 80px;
            background: #333;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #777;
        }

        .video-info h3 { font-size: 14px; margin: 0; }
        .video-info p { font-size: 12px; color: #aaa; margin-top: 5px; }

        .nav-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 60px;
            background: var(--yt-black);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #333;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">LAMONIÊ FLASH PREMIERE</div>
    </header>

    <div id="video-container">
        <div class="video-wrapper">
            <iframe id="player" src="https://www.youtube-nocookie.com/embed/L_jWHffIx5E?modestbranding=1&rel=0" allowfullscreen></iframe>
        </div>
    </div>

    <div class="categories">
        <button class="cat-btn">Tudo</button>
        <button class="cat-btn">Forró</button>
        <button class="cat-btn">Notícias</button>
        <button class="cat-btn">Ceará</button>
    </div>

    <main class="feed">
        <div class="video-item" onclick="trocarVideo('dQw4w9WgXcQ', 'Música de Teste 1')">
            <div class="thumb-box">VÍDEO 1</div>
            <div class="video-info">
                <h3>Teste: Luiz Gonzaga - Asa Branca</h3>
                <p>Lamoniê Flash • Canal Oficial</p>
            </div>
        </div>

        <div class="video-item" onclick="trocarVideo('L_jWHffIx5E', 'Música de Teste 2')">
            <div class="thumb-box">VÍDEO 2</div>
            <div class="video-info">
                <h3>Teste: Forró das Antigas</h3>
                <p>Lamoniê Flash • Canal Oficial</p>
            </div>
        </div>
    </main>

    <nav class="nav-bar">
        <span>Início</span>
        <span>Shorts</span>
        <span>Canal</span>
    </nav>

    <script>
        function trocarVideo(id, titulo) {
            // O segredo do teste está no 'youtube-nocookie' para ver se corta os comerciais
            document.getElementById('player').src = "https://www.youtube-nocookie.com/embed/" + id + "?autoplay=1&modestbranding=1&rel=0";
            window.scrollTo(0,0);
        }
    </script>

</body>
</html>
