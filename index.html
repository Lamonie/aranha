<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIÊ FLASH TOTAL</title>
    <style>
        :root {
            --yt-black: #0f0f0f;
            --yt-white: #ffffff;
            --yt-gray: #272727;
            --lamonie-gold: #FFD700;
        }

        body {
            background-color: var(--yt-black);
            color: var(--yt-white);
            font-family: Roboto, Arial, sans-serif;
            margin: 0;
            padding-bottom: 70px;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            height: 56px;
            position: fixed;
            top: 0;
            width: 100%;
            background: var(--yt-black);
            z-index: 1000;
            box-sizing: border-box;
        }

        .logo { font-weight: bold; font-size: 18px; color: var(--lamonie-gold); }

        /* PLAYER FIXO */
        #video-container {
            width: 100%;
            position: fixed;
            top: 56px;
            z-index: 900;
            background: #000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.8);
        }

        .video-wrapper { width: 100%; aspect-ratio: 16 / 9; }
        iframe { width: 100%; height: 100%; border: none; }

        /* BOTÕES QUE FUNCIONAM */
        .categories {
            display: flex;
            overflow-x: auto;
            padding: 12px;
            gap: 10px;
            margin-top: calc(56px + 56.25vw);
            background: var(--yt-black);
            position: sticky;
            top: calc(56px + 56.25vw);
            z-index: 800;
        }

        .cat-btn {
            background: var(--yt-gray);
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            white-space: nowrap;
            cursor: pointer;
        }

        .cat-btn:hover { background: #444; }

        /* FEED COM MUITOS VÍDEOS */
        .feed {
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .video-card {
            cursor: pointer;
            transition: 0.3s;
        }

        .video-card img {
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: 12px;
            background: #333;
            object-fit: cover;
        }

        .video-card h3 {
            font-size: 14px;
            margin: 10px 0 5px 0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .video-card p { font-size: 12px; color: #aaa; margin: 0; }

        .nav-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 60px;
            background: var(--yt-black);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #333;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">LAMONIÊ FLASH PREMIERE</div>
        <div style="font-size: 20px;">🔍</div>
    </header>

    <div id="video-container">
        <div class="video-wrapper">
            <iframe id="mainPlayer" src="https://www.youtube-nocookie.com/embed/L_jWHffIx5E?autoplay=1&modestbranding=1" allowfullscreen></iframe>
        </div>
    </div>

    <div class="categories">
        <button class="cat-btn" onclick="filtrar('Tudo')">Tudo</button>
        <button class="cat-btn" onclick="filtrar('Forró das Antigas')">Forró</button>
        <button class="cat-btn" onclick="filtrar('Notícias do Ceará')">Notícias</button>
        <button class="cat-btn" onclick="filtrar('Luiz Gonzaga Rei do Baião')">Luiz Gonzaga</button>
        <button class="cat-btn" onclick="filtrar('Ao vivo agora')">Ao Vivo</button>
    </div>

    <main class="feed" id="videoFeed">
        </main>

    <nav class="nav-bar">
        <span>🏠 Início</span>
        <span>🎬 Shorts</span>
        <span>📂 Canal</span>
    </nav>

    <script>
        // Lista de vídeos para simular o "leque" aberto sem usar API Key
        const bancoDeDados = [
            {id: 'dQw4w9WgXcQ', title: 'Asa Branca - Clássico Rei', cat: 'Luiz Gonzaga'},
            {id: 'L_jWHffIx5E', title: 'Melhores do Forró das Antigas', cat: 'Forró'},
            {id: 'v2AC41dglnM', title: 'Notícias Urgentes Ceará', cat: 'Notícias'},
            {id: 'hT_nvWreIhg', title: 'Luiz Gonzaga - O Xote das Meninas', cat: 'Luiz Gonzaga'},
            {id: '5p_2u87N644', title: 'Grandes Sucessos Mastruz com Leite', cat: 'Forró'},
            {id: 'JFm7YhUz_S4', title: 'Ao Vivo: Rádio Verdes Mares', cat: 'Ao Vivo'},
            {id: '2m-D9m_9SgU', title: 'Notícias de Jaíbaras e Região', cat: 'Notícias'},
            {id: 'k_vMv7v6Y_o', title: 'Dominguinhos & Luiz Gonzaga', cat: 'Luiz Gonzaga'}
        ];

        function carregarFeed(videos) {
            const feed = document.getElementById('videoFeed');
            feed.innerHTML = '';
            
            videos.forEach(v => {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.onclick = () => {
                    document.getElementById('mainPlayer').src = `https://www.youtube-nocookie.com/embed/${v.id}?autoplay=1&modestbranding=1`;
                    window.scrollTo(0,0);
                };
                card.innerHTML = `
                    <img src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg">
                    <h3>${v.title}</h3>
                    <p>Lamoniê Flash • 2026</p>
                `;
                feed.appendChild(card);
            });
        }

        function filtrar(categoria) {
            if(categoria === 'Tudo') {
                carregarFeed(bancoDeDados);
            } else {
                const filtrados = bancoDeDados.filter(v => v.cat.includes(categoria) || v.title.includes(categoria));
                carregarFeed(filtrados);
            }
        }

        // Inicia carregando tudo
        carregarFeed(bancoDeDados);
    </script>

</body>
</html>
